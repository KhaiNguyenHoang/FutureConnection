name: CD — Build & Push Docker Images

on:
  push:
    branches: [main]
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/futureconnection

jobs:
  # ── Step 1: Build & Test must pass before any image is pushed ──
  verify:
    name: Verify Build & Tests
    uses: ./.github/workflows/ci.yml

  # ── Step 2: Build + Push Docker images in parallel for each service ──
  build-and-push:
    name: Docker — ${{ matrix.service }}
    needs: verify
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: identity-service
            dockerfile: Backend/FutureConnection.IdentityService/Dockerfile
          - service: profile-service
            dockerfile: Backend/FutureConnection.ProfileService/Dockerfile
          - service: social-service
            dockerfile: Backend/FutureConnection.SocialService/Dockerfile
          - service: chat-service
            dockerfile: Backend/FutureConnection.ChatService/Dockerfile
          - service: job-service
            dockerfile: Backend/FutureConnection.JobService/Dockerfile
          - service: community-service
            dockerfile: Backend/FutureConnection.CommunityService/Dockerfile
          - service: freelance-service
            dockerfile: Backend/FutureConnection.FreelanceService/Dockerfile

    permissions:
      contents: read
      packages: write   # required to push to GHCR

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate image tags:
      #   latest    → pushed on every merge to main
      #   sha-abcdef → immutable tag for the exact commit (enables easy rollbacks)
      - name: Generate Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: Backend
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache from previous runs → much faster incremental builds
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:buildcache,mode=max
          # ── Inject secrets as build-time env variables ──
          # Set these in: GitHub Repo → Settings → Secrets and variables → Actions
          build-args: |
            CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            JWT_KEY=${{ secrets.JWT_KEY }}
            JWT_ISSUER=${{ secrets.JWT_ISSUER }}
            DB_CONNECTION_STRING=${{ secrets.DB_CONNECTION_STRING }}
            REDIS_CONNECTION_STRING=${{ secrets.REDIS_CONNECTION_STRING }}
            KAFKA_BOOTSTRAP_SERVERS=${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}
