name: CI — Build & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  build-and-test:
    name: Build & Test (.NET ${{ env.DOTNET_VERSION }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Cache NuGet packages to speed up subsequent runs
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore Backend/FutureConnection.slnx

      - name: Build solution
        run: dotnet build Backend/FutureConnection.slnx --no-restore --configuration Release

      - name: Run tests
        run: >
          dotnet test Backend/FutureConnection.slnx
          --no-build
          --configuration Release
          --verbosity normal
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./test-results

      # Publish test results to GitHub (visible in the PR checks UI)
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: xUnit Tests
          path: test-results/*.trx
          reporter: dotnet-trx
          fail-on-error: true
