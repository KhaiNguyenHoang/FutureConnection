services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: futureconnection_sql
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${SA_PASSWORD} -Q 'SELECT 1' -C || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:alpine
    container_name: futureconnection_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  kafka:
    image: apache/kafka:latest
    container_name: futureconnection_kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:9093'
      KAFKA_LISTENERS: 'CONTROLLER://:9094,PLAINTEXT_HOST://:9092,PLAINTEXT://:9093'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9094'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  identity-service:
    build:
      context: .
      dockerfile: FutureConnection.IdentityService/Dockerfile
    container_name: futureconnection_identity
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=FutureConnectionDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True
      - ConnectionStrings__Kafka=kafka:9093
      - ConnectionStrings__Redis=redis:6379
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=FutureConnection.IdentityService
      - Jwt__Audience=FutureConnection.Clients
      - Cloudinary__CloudName=${CLOUDINARY_CLOUD_NAME}
      - Cloudinary__ApiKey=${CLOUDINARY_API_KEY}
      - Cloudinary__ApiSecret=${CLOUDINARY_API_SECRET}
      - OAuth__GitHub__ClientId=${GITHUB_CLIENT_ID}
      - OAuth__GitHub__ClientSecret=${GITHUB_CLIENT_SECRET}
      - OAuth__Google__ClientId=${GOOGLE_CLIENT_ID}
      - OAuth__Google__ClientSecret=${GOOGLE_CLIENT_SECRET}
      - Email__SmtpHost=${EMAIL_SMTP_HOST}
      - Email__SmtpPort=${EMAIL_SMTP_PORT}
      - Email__SmtpUser=${EMAIL_SMTP_USER}
      - Email__SmtpPassword=${EMAIL_SMTP_PASSWORD}
      - Email__FromEmail=${EMAIL_FROM}
      - Email__FromName=${EMAIL_FROM_NAME}
      - App__Url=http://localhost:3000
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      sqlserver:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5001:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  profile-service:
    build:
      context: .
      dockerfile: FutureConnection.ProfileService/Dockerfile
    container_name: futureconnection_profile
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=FutureConnectionDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__Kafka=kafka:9093
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=FutureConnection.IdentityService
      - Jwt__Audience=FutureConnection.Clients
      - Cloudinary__CloudName=${CLOUDINARY_CLOUD_NAME}
      - Cloudinary__ApiKey=${CLOUDINARY_API_KEY}
      - Cloudinary__ApiSecret=${CLOUDINARY_API_SECRET}
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "5002:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  job-service:
    build:
      context: .
      dockerfile: FutureConnection.JobService/Dockerfile
    container_name: futureconnection_job
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=FutureConnectionDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__Kafka=kafka:9093
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=FutureConnection.IdentityService
      - Jwt__Audience=FutureConnection.Clients
      - Cloudinary__CloudName=${CLOUDINARY_CLOUD_NAME}
      - Cloudinary__ApiKey=${CLOUDINARY_API_KEY}
      - Cloudinary__ApiSecret=${CLOUDINARY_API_SECRET}
    depends_on:
