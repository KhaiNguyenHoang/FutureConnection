      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=FutureConnectionDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__Kafka=kafka:9093
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=FutureConnection.IdentityService
      - Jwt__Audience=FutureConnection.Clients
      - Cloudinary__CloudName=${CLOUDINARY_CLOUD_NAME}
      - Cloudinary__ApiKey=${CLOUDINARY_API_KEY}
      - Cloudinary__ApiSecret=${CLOUDINARY_API_SECRET}
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
