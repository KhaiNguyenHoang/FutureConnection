    container_name: futureconnection_community
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=FutureConnectionDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True
      - ConnectionStrings__Redis=redis:6379
