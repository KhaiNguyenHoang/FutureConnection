  gateway:
    build:
      context: .
      dockerfile: FutureConnection.Gateway/Dockerfile
    container_name: futureconnection_gateway
    environment:
      - AllowedOrigins__0=http://localhost:3000
      - AllowedOrigins__1=http://futureconnection_frontend:3000
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=FutureConnection.IdentityService
      - Jwt__Audience=FutureConnection.Clients
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=FutureConnectionDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True
    ports:
      - "5000:8080"
    restart: unless-stopped
    depends_on:
      identity-service:
        condition: service_healthy
      profile-service:
